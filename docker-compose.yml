version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zanevadb
      POSTGRES_USER: zaneva
      POSTGRES_PASSWORD: zanevapass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zaneva -d zanevadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://zaneva:zanevapass123@postgres:5432/zanevadb?schema=public"
      NODE_ENV: development
      JWT_SECRET: "super-secret-dev-key-change-in-prod"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
