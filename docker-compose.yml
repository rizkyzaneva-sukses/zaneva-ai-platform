version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zanevadb
      POSTGRES_USER: zaneva
      POSTGRES_PASSWORD: zanevapass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zaneva -d zanevadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # MONOLITH MODE (Production)
  # Build image dengan: docker-compose build
  # Jalankan dengan:    docker-compose up -d
  # Akses di:           http://localhost:3000
  # -------------------------------------------------------
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://zaneva:zanevapass123@postgres:5432/zanevadb?schema=public"
      NODE_ENV: production
      JWT_SECRET: "${JWT_SECRET:-super-secret-change-in-prod}"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    # Dockerfile sudah handle migrate + start otomatis
    # CMD: npx prisma migrate deploy && node dist/server.js

volumes:
  postgres_data:
